plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keyProperties = new Properties()
def keyPropertiesFile = rootProject.file("key.properties")
if (keyPropertiesFile.exists()) {
    keyPropertiesFile.withInputStream { stream ->
        keyProperties.load(stream)
    }
}

def releaseStoreFile = System.getenv("WAYFARE_ANDROID_KEYSTORE") ?: keyProperties.getProperty("storeFile")
def releaseStorePassword = System.getenv("WAYFARE_ANDROID_STORE_PASSWORD") ?: keyProperties.getProperty("storePassword")
def releaseKeyAlias = System.getenv("WAYFARE_ANDROID_KEY_ALIAS") ?: keyProperties.getProperty("keyAlias")
def releaseKeyPassword = System.getenv("WAYFARE_ANDROID_KEY_PASSWORD") ?: keyProperties.getProperty("keyPassword")
def hasReleaseSigning = [releaseStoreFile, releaseStorePassword, releaseKeyAlias, releaseKeyPassword].every {
    it != null && it.toString().trim()
}
def releaseTaskRequested = gradle.startParameter.taskNames.any {
    it.toLowerCase(Locale.ROOT).contains("release")
}

android {
    namespace "com.idm.travelplanner"
    compileSdk flutter.compileSdkVersion

    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.idm.travelplanner"
        minSdkVersion flutter.minSdkVersion
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            if (!hasReleaseSigning && releaseTaskRequested) {
                throw new GradleException(
                    "Release signing is required. Set WAYFARE_ANDROID_KEYSTORE, " +
                    "WAYFARE_ANDROID_STORE_PASSWORD, WAYFARE_ANDROID_KEY_ALIAS, " +
                    "and WAYFARE_ANDROID_KEY_PASSWORD, or create ignored android/key.properties."
                )
            }
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation 'com.amap.api:3dmap:8.1.0'
    implementation 'com.amap.api:location:6.4.7'
}
