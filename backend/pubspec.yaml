name: wayfare_backend
description: Dart API scaffold for the Wayfare travel planning app.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  crypto: ^3.0.7
  sqlite3: ^3.3.2
dev_dependencies:
  test: ^1.31.1

hooks:
  user_defines:
    sqlite3:
      source: system
      name_windows: winsqlite3
      name: sqlite3
